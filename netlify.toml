# Netlify build config for this Next.js 15 app.
# The Next.js runtime plugin handles SSR, middleware, the dynamic OG image
# and next/image — do not set a publish directory manually; the plugin does.

[build]
  command = "next build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
